name: Release QA and Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run id del pipeline CI del TP04"
        required: true
        type: string
      deploy_qa:
        description: "Desplegar QA"
        required: true
        default: true
        type: boolean
      deploy_prod:
        description: "Desplegar Produccion (requiere aprobacion manual)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-run:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      source_run_id: ${{ steps.pick.outputs.source_run_id }}
      source_sha: ${{ steps.pick.outputs.source_sha }}
      deploy_qa: ${{ steps.pick.outputs.deploy_qa }}
      deploy_prod: ${{ steps.pick.outputs.deploy_prod }}
    steps:
      - name: Resolve source run id and flags
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "source_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_qa=true" >> "$GITHUB_OUTPUT"
            echo "deploy_prod=true" >> "$GITHUB_OUTPUT"
          else
            echo "source_run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            echo "deploy_qa=${{ inputs.deploy_qa }}" >> "$GITHUB_OUTPUT"
            echo "deploy_prod=${{ inputs.deploy_prod }}" >> "$GITHUB_OUTPUT"

            RUN_API_URL="${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ inputs.source_run_id }}"
            RUN_JSON=$(curl --fail --show-error --silent \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "$RUN_API_URL")

            RUN_CONCLUSION=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("conclusion",""))' "$RUN_JSON")
            RUN_BRANCH=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("head_branch",""))' "$RUN_JSON")
            SOURCE_SHA=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("head_sha",""))' "$RUN_JSON")

            if [ "$RUN_CONCLUSION" != "success" ]; then
              echo "El source_run_id=${{ inputs.source_run_id }} no termino en success (conclusion=$RUN_CONCLUSION)" >&2
              exit 1
            fi
            if [ "$RUN_BRANCH" != "main" ]; then
              echo "El source_run_id=${{ inputs.source_run_id }} no pertenece a main (branch=$RUN_BRANCH)" >&2
              exit 1
            fi
            if [ -z "$SOURCE_SHA" ]; then
              echo "No se pudo resolver head_sha para source_run_id=${{ inputs.source_run_id }}" >&2
              exit 1
            fi
            echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          fi

  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    needs: resolve-run
    if: needs.resolve-run.outputs.deploy_qa == 'true'
    environment: qa
    steps:
      - name: Download front artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: front-dist
          run-id: ${{ needs.resolve-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/front-dist

      - name: Download back artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: back-dist
          run-id: ${{ needs.resolve-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/back-dist

      - name: Verify artifacts
        run: |
          test -d artifacts/front-dist
          test -d artifacts/back-dist
          echo "Artifacts from CI run ${{ needs.resolve-run.outputs.source_run_id }} ready"
          echo "Deploying commit SHA: ${{ needs.resolve-run.outputs.source_sha }}"

      - name: Verify Render secrets for QA
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACK_QA }}" ] || [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONT_QA }}" ]; then
            echo "Faltan secrets para deploy deterministico QA: RENDER_DEPLOY_HOOK_BACK_QA y/o RENDER_DEPLOY_HOOK_FRONT_QA" >&2
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID_BACK_QA }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID_FRONT_QA }}" ]; then
            echo "Faltan secrets para espera de deploy QA: RENDER_API_KEY, RENDER_SERVICE_ID_BACK_QA y/o RENDER_SERVICE_ID_FRONT_QA" >&2
            exit 1
          fi
          if [ -z "${{ secrets.BACK_QA_URL }}" ]; then
            echo "Falta BACK_QA_URL para health check QA" >&2
            exit 1
          fi

      - name: Trigger Render deploy (Back QA pinned to CI SHA)
        id: trigger-back-qa
        run: |
          BACK_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_BACK_QA }}"
          SEP='?'
          if [[ "$BACK_HOOK" == *\?* ]]; then
            SEP='&'
          fi
          RESPONSE=$(curl --fail --show-error --silent -X POST \
            "${BACK_HOOK}${SEP}ref=${{ needs.resolve-run.outputs.source_sha }}")
          DEPLOY_ID=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"id"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"id"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/')
          if [ -z "$DEPLOY_ID" ]; then
            echo "No se pudo obtener deploy_id para Back QA desde Deploy Hook." >&2
            echo "Respuesta hook: $RESPONSE" >&2
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Back QA deploy_id: $DEPLOY_ID"

      - name: Trigger Render deploy (Front QA pinned to CI SHA)
        id: trigger-front-qa
        run: |
          FRONT_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_FRONT_QA }}"
          SEP='?'
          if [[ "$FRONT_HOOK" == *\?* ]]; then
            SEP='&'
          fi
          RESPONSE=$(curl --fail --show-error --silent -X POST \
            "${FRONT_HOOK}${SEP}ref=${{ needs.resolve-run.outputs.source_sha }}")
          DEPLOY_ID=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"id"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"id"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/')
          if [ -z "$DEPLOY_ID" ]; then
            echo "No se pudo obtener deploy_id para Front QA desde Deploy Hook." >&2
            echo "Respuesta hook: $RESPONSE" >&2
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Front QA deploy_id: $DEPLOY_ID"

      - name: Wait for Render deploy completion QA (back + front)
        run: |
          wait_render_deploy() {
            local service_id="$1"
            local deploy_id="$2"
            local label="$3"
            local timeout_seconds=600
            local poll_interval_seconds=10
            local deadline=$(( $(date +%s) + timeout_seconds ))

            while true; do
              RESPONSE=$(curl --fail --show-error --silent \
                -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                -H "Accept: application/json" \
                "https://api.render.com/v1/services/${service_id}/deploys/${deploy_id}")

              STATUS=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"status"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"status"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/' | tr '[:upper:]' '[:lower:]')
              if [ -z "$STATUS" ]; then
                echo "$label: no se pudo leer status del deploy." >&2
                echo "$label response: $RESPONSE" >&2
                return 1
              fi

              echo "$label status=$STATUS (deploy_id=$deploy_id)"
              case "$STATUS" in
                live|deployed|update_succeeded|build_succeeded|succeeded|success)
                  echo "$label deploy completo"
                  return 0
                  ;;
                failed|build_failed|update_failed|error|canceled|cancelled|deactivated)
                  echo "$label deploy fallo con estado final: $STATUS" >&2
                  return 1
                  ;;
              esac

              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "$label deploy timeout (${timeout_seconds}s)" >&2
                return 1
              fi

              sleep "$poll_interval_seconds"
            done
          }

          wait_render_deploy "${{ secrets.RENDER_SERVICE_ID_BACK_QA }}" "${{ steps.trigger-back-qa.outputs.deploy_id }}" "Back QA"
          wait_render_deploy "${{ secrets.RENDER_SERVICE_ID_FRONT_QA }}" "${{ steps.trigger-front-qa.outputs.deploy_id }}" "Front QA"

      - name: Health check QA
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACK_QA_URL }}/health" || true)
            if [ "$code" = "200" ]; then
              echo "QA health check OK"
              exit 0
            fi
            echo "QA not ready yet (attempt $i), code=$code"
            sleep 15
          done
          echo "QA health check failed"
          exit 1

      - name: Checkout repository (for post-deploy tests)
        uses: actions/checkout@v4

      - name: Setup Node (post-deploy QA tests)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Verify QA URLs for post-deploy tests
        run: |
          if [ -z "${{ secrets.FRONT_QA_URL }}" ] || [ -z "${{ secrets.BACK_QA_URL }}" ]; then
            echo "Faltan secrets para pruebas post-deploy QA: FRONT_QA_URL y/o BACK_QA_URL" >&2
            exit 1
          fi

      - name: Install frontend dependencies (post-deploy QA tests)
        run: npm install --prefix front

      - name: Run Cypress E2E against QA (with JUnit report)
        run: |
          mkdir -p front/test-results/cypress
          cd front
          CYPRESS_BASE_URL="${{ secrets.FRONT_QA_URL }}" \
          CYPRESS_API_URL="${{ secrets.BACK_QA_URL }}" \
          npm run e2e -- \
            --reporter junit \
            --reporter-options "mochaFile=test-results/cypress/e2e-qa-[hash].xml,toConsole=true"

      - name: Upload Cypress JUnit report for QA (formal)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-e2e-junit-qa
          path: front/test-results/cypress/*.xml
          if-no-files-found: warn

      - name: Resumen E2E QA (visible sin descargar)
        if: always()
        run: |
          shopt -s nullglob
          REPORT_FILES=(front/test-results/cypress/*.xml)

          if [ ${#REPORT_FILES[@]} -eq 0 ]; then
            {
              echo "### E2E Cypress QA"
              echo ""
              echo "No se encontro reporte JUnit de Cypress."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          STATS=$(node -e '
            const fs = require("fs");
            const files = process.argv.slice(1);
            const attr = (s, k) => {
              const m = s.match(new RegExp(`\\b${k}="([0-9]+)"`));
              return m ? Number(m[1]) : 0;
            };
            let tests = 0, failures = 0, errors = 0, skipped = 0;
            for (const f of files) {
              const xml = fs.readFileSync(f, "utf8");
              for (const m of xml.matchAll(/<testsuite\b([^>]*)>/g)) {
                const a = m[1] || "";
                tests += attr(a, "tests");
                failures += attr(a, "failures");
                errors += attr(a, "errors");
                skipped += attr(a, "skipped");
              }
            }
            process.stdout.write(`${tests} ${failures} ${errors} ${skipped}`);
          ' "${REPORT_FILES[@]}" || echo "0 0 0 0")
          set -- $STATS
          TESTS=${1:-0}
          FAILURES=${2:-0}
          ERRORS=${3:-0}
          SKIPPED=${4:-0}

          TEST_CASES=$(node -e '
            const fs = require("fs");
            const files = process.argv.slice(1);
            const names = [];
            for (const f of files) {
              const xml = fs.readFileSync(f, "utf8");
              const re = /<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g;
              for (const m of xml.matchAll(re)) {
                const attrs = m[1] || m[3] || "";
                const name = (attrs.match(/\bname="([^"]*)"/) || [])[1] || "";
                const cls = (attrs.match(/\bclassname="([^"]*)"/) || [])[1] || "";
                if (name) names.push(cls ? `${cls} :: ${name}` : name);
              }
            }
            process.stdout.write(names.join("\n"));
          ' "${REPORT_FILES[@]}" || true)

          FAILED_TEST_CASES=$(node -e '
            const fs = require("fs");
            const files = process.argv.slice(1);
            const failed = [];
            for (const f of files) {
              const xml = fs.readFileSync(f, "utf8");
              const re = /<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g;
              for (const m of xml.matchAll(re)) {
                const attrs = m[1] || m[3] || "";
                const body = m[2] || "";
                const name = (attrs.match(/\bname="([^"]*)"/) || [])[1] || "";
                const cls = (attrs.match(/\bclassname="([^"]*)"/) || [])[1] || "";
                if (!name) continue;
                if (/<(failure|error)\b/.test(body)) failed.push(cls ? `${cls} :: ${name}` : name);
              }
            }
            process.stdout.write(failed.join("\n"));
          ' "${REPORT_FILES[@]}" || true)

          {
            echo "### E2E Cypress QA"
            echo ""
            echo "| pruebas | fallas | errores | omitidas |"
            echo "| ---: | ---: | ---: | ---: |"
            echo "| $TESTS | $FAILURES | $ERRORS | $SKIPPED |"
            echo ""
            echo "Casos cubiertos:"
            echo "- Crear tarea"
            echo "- Actualizar tarea"
            echo "- Manejo de error front-back"
            echo ""
            echo "Detalle de pruebas ejecutadas:"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$TEST_CASES" ]; then
            while IFS= read -r test_case; do
              [ -n "$test_case" ] && echo "- $test_case" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$TEST_CASES"
          else
            echo "- No disponible" >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "Pruebas fallidas:"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$FAILED_TEST_CASES" ]; then
            while IFS= read -r failed_case; do
              [ -n "$failed_case" ] && echo "- $failed_case" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$FAILED_TEST_CASES"
          else
            echo "- Ninguna" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Cypress artifacts on QA failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-qa-failure-artifacts
          path: |
            front/cypress/screenshots
            front/cypress/videos
          if-no-files-found: ignore

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [resolve-run, deploy-qa]
    if: needs.resolve-run.outputs.deploy_prod == 'true'
    environment: production
    steps:
      - name: Download front artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: front-dist
          run-id: ${{ needs.resolve-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/front-dist

      - name: Download back artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: back-dist
          run-id: ${{ needs.resolve-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/back-dist

      - name: Verify artifacts
        run: |
          test -d artifacts/front-dist
          test -d artifacts/back-dist
          echo "Artifacts from CI run ${{ needs.resolve-run.outputs.source_run_id }} ready"
          echo "Deploying commit SHA: ${{ needs.resolve-run.outputs.source_sha }}"

      - name: Verify Render secrets for PROD
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACK_PROD }}" ] || [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONT_PROD }}" ]; then
            echo "Faltan secrets para deploy deterministico PROD: RENDER_DEPLOY_HOOK_BACK_PROD y/o RENDER_DEPLOY_HOOK_FRONT_PROD" >&2
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID_BACK_PROD }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID_FRONT_PROD }}" ]; then
            echo "Faltan secrets para espera de deploy PROD: RENDER_API_KEY, RENDER_SERVICE_ID_BACK_PROD y/o RENDER_SERVICE_ID_FRONT_PROD" >&2
            exit 1
          fi
          if [ -z "${{ secrets.BACK_PROD_URL }}" ]; then
            echo "Falta BACK_PROD_URL para health check PROD" >&2
            exit 1
          fi

      - name: Trigger Render deploy (Back PROD pinned to CI SHA)
        id: trigger-back-prod
        run: |
          BACK_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_BACK_PROD }}"
          SEP='?'
          if [[ "$BACK_HOOK" == *\?* ]]; then
            SEP='&'
          fi
          RESPONSE=$(curl --fail --show-error --silent -X POST \
            "${BACK_HOOK}${SEP}ref=${{ needs.resolve-run.outputs.source_sha }}")
          DEPLOY_ID=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"id"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"id"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/')
          if [ -z "$DEPLOY_ID" ]; then
            echo "No se pudo obtener deploy_id para Back PROD desde Deploy Hook." >&2
            echo "Respuesta hook: $RESPONSE" >&2
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Back PROD deploy_id: $DEPLOY_ID"

      - name: Trigger Render deploy (Front PROD pinned to CI SHA)
        id: trigger-front-prod
        run: |
          FRONT_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_FRONT_PROD }}"
          SEP='?'
          if [[ "$FRONT_HOOK" == *\?* ]]; then
            SEP='&'
          fi
          RESPONSE=$(curl --fail --show-error --silent -X POST \
            "${FRONT_HOOK}${SEP}ref=${{ needs.resolve-run.outputs.source_sha }}")
          DEPLOY_ID=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"id"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"id"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/')
          if [ -z "$DEPLOY_ID" ]; then
            echo "No se pudo obtener deploy_id para Front PROD desde Deploy Hook." >&2
            echo "Respuesta hook: $RESPONSE" >&2
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Front PROD deploy_id: $DEPLOY_ID"

      - name: Wait for Render deploy completion PROD (back + front)
        run: |
          wait_render_deploy() {
            local service_id="$1"
            local deploy_id="$2"
            local label="$3"
            local timeout_seconds=600
            local poll_interval_seconds=10
            local deadline=$(( $(date +%s) + timeout_seconds ))

            while true; do
              RESPONSE=$(curl --fail --show-error --silent \
                -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                -H "Accept: application/json" \
                "https://api.render.com/v1/services/${service_id}/deploys/${deploy_id}")

              STATUS=$(printf '%s' "$RESPONSE" | tr -d '\n' | grep -oE '"status"[[:space:]]*:[[:space:]]*"[^"]+"' | head -n1 | sed -E 's/^"status"[[:space:]]*:[[:space:]]*"([^"]+)"$/\1/' | tr '[:upper:]' '[:lower:]')
              if [ -z "$STATUS" ]; then
                echo "$label: no se pudo leer status del deploy." >&2
                echo "$label response: $RESPONSE" >&2
                return 1
              fi

              echo "$label status=$STATUS (deploy_id=$deploy_id)"
              case "$STATUS" in
                live|deployed|update_succeeded|build_succeeded|succeeded|success)
                  echo "$label deploy completo"
                  return 0
                  ;;
                failed|build_failed|update_failed|error|canceled|cancelled|deactivated)
                  echo "$label deploy fallo con estado final: $STATUS" >&2
                  return 1
                  ;;
              esac

              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "$label deploy timeout (${timeout_seconds}s)" >&2
                return 1
              fi

              sleep "$poll_interval_seconds"
            done
          }

          wait_render_deploy "${{ secrets.RENDER_SERVICE_ID_BACK_PROD }}" "${{ steps.trigger-back-prod.outputs.deploy_id }}" "Back PROD"
          wait_render_deploy "${{ secrets.RENDER_SERVICE_ID_FRONT_PROD }}" "${{ steps.trigger-front-prod.outputs.deploy_id }}" "Front PROD"

      - name: Health check PROD
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACK_PROD_URL }}/health" || true)
            if [ "$code" = "200" ]; then
              echo "Production health check OK"
              exit 0
            fi
            echo "Production not ready yet (attempt $i), code=$code"
            sleep 15
          done
          echo "Production health check failed"
          exit 1
